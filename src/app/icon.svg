<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- White background -->
  <rect width="64" height="64" rx="12" fill="#fff"/>
  <!-- Left roof peak (back) -->
  <polyline points="4,46 26,14 44,38" stroke="#8B1A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right roof peak (front) -->
  <polyline points="18,46 40,12 60,46" stroke="#8B1A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chimney on left peak -->
  <rect x="21" y="16" width="5" height="9" rx="1" fill="#fff" stroke="#8B1A1A" stroke-width="3"/>
</svg>
